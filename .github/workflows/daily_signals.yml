name: Daily Live Signals

on:
  schedule:
    - cron: '25 19 * * 1-5'
    - cron: '25 20 * * 1-5'
  workflow_dispatch:
    inputs:
      date:
        description: 'Signal date YYYY-MM-DD, leave blank for today'
        required: false
        default: ''

jobs:
  generate-signals:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Debug API key
        env:
          MASSIVE_API_KEY: ${{ secrets.MASSIVE_API_KEY }}
        run: |
          if [ -n "$MASSIVE_API_KEY" ]; then
            echo "API key SET length=${#MASSIVE_API_KEY} first4=${MASSIVE_API_KEY:0:4}"
          else
            echo "API key NOT SET"
          fi

      - name: Generate signals
        env:
          MASSIVE_API_KEY: ${{ secrets.MASSIVE_API_KEY }}
          MASSIVE_API_URL: https://api.massive.com/v2
        run: |
          if [ -n "${{ github.event.inputs.date }}" ]; then
            python live_signal_generator.py --date "${{ github.event.inputs.date }}"
          else
            python live_signal_generator.py
          fi

      - name: Upload signals artifact
        uses: actions/upload-artifact@v4
        with:
          name: live-signals-${{ github.run_id }}
          path: output/signals/
          retention-days: 90

      - name: Commit signals to repo
        if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add output/signals/ || true
          git diff --cached --quiet || git commit -m "signals: $(date -u '+%Y-%m-%d')"
          git push || true
